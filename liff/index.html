<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MENA COSMETICS — ระบบลางาน</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .loader { text-align: center; padding: 32px; }
    .loader img { width: 80px; height: 80px; margin-bottom: 16px; }
  </style>
  <script>
    // preserve LIFF query state + hash เวลา redirect ไป myid.html
    // (ห้าม drop search/hash ไม่งั้น LIFF SDK loop)
    (function () {
      var target = './myid.html' + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <div class="loader">
    <img src="./img/logo.svg" alt="MENA" />
    <div class="brand">MENA COSMETICS</div>
    <div style="margin-top:12px;color:#666">กำลังโหลด…</div>
  </div>
</body>
</html>
